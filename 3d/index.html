  .ctl{position:fixed;bottom:14px;left:0;right:0;display:flex;justify-content:center;gap:6px;z-index:11;flex-wrap:wrap;padding:0 8px;}
  #ver{position:fixed;right:6px;bottom:54px;z-index:11;font:11px/1 monospace;color:#fff;background:rgba(0,0,0,.4);padding:2px 6px;border-radius:4px;}

  #coach b{color:#6fce7e;} #coach .qa{color:#ffd24a;}
  #title{position:fixed;inset:0;z-index:50;background:rgba(8,10,18,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
  #title .emblem{width:84px;height:84px;border-radius:50%;background:#2d8a3d;color:#fff;font-size:44px;font-weight:700;display:flex;align-items:center;justify-content:center;border:3px solid #6fce7e;margin-bottom:18px;}

  #title .tt-main span{color:#6fce7e;}
  #title .tt-ver{font-size:14px;color:rgba(255,255,255,.55);margin:10px 0 26px;}
  #title #startBtn{font:600 18px inherit;padding:14px 44px;border-radius:12px;border:none;background:#2d8a3d;color:#fff;cursor:pointer;}
  #title #startBtn:active{transform:scale(.97);}
  #title .tt-note{font-size:12px;color:rgba(255,255,255,.45);margin-top:18px;}
  #fmPanel{position:fixed;inset:0;z-index:60;background:rgba(8,10,18,.7);display:none;align-items:center;justify-content:center;padding:16px;}
  #fmPanel .fmBox{background:#161a24;border:1px solid rgba(111,206,126,.4);border-radius:14px;padding:18px;width:min(94%,420px);max-height:82%;overflow:auto;}
  #fmPanel .fmHd{font-size:16px;font-weight:600;margin-bottom:12px;color:#6fce7e;}

  #fmPanel button{font:14px inherit;padding:9px 14px;border-radius:8px;border:none;background:#2d8a3d;color:#fff;cursor:pointer;}

<script type="module">
import * as THREE from 'three';

const L=30, Wd=18, GW=6, gTop=(Wd-GW)/2, gBot=(Wd+GW)/2;
const HALLX=66, HALLZ=46;                 // エコパアリーナ実寸大の開放的な床（中央にコート1面／3面ぶん取れる広さ）
const PB_DEPTH=4, PB_HALF=4.5;            // ペナルティ(ゴール)エリア
const HX=0.65, HY=0.5, GUARD=0.12, BR=0.1625, REAR=0.35, EDGE=Math.hypot(HX+GUARD,HY); // REAR=後輪軸が幾何中心より後方=旋回ピボット
// 車椅子が走れる範囲＝体育館全域（壁の内側）
const RX0=L/2-HALLX/2+0.8, RX1=L/2+HALLX/2-0.8, RY0=Wd/2-HALLZ/2+0.8, RY1=Wd/2+HALLZ/2-0.8;
let SPEED=2.9; const ACC=8, DEC=10, MO=5.0, AAC=24, ADC=20, BDEC=0.5, E=0.5, GRIP=0.4;  // 10km/h相当＋加速/回転を上げてキビキビ・スピンキック強化

const ROSTER={
  blue:[{n:'1',name:'デルGK',gk:true},{n:'6',name:'中村(K)'},{n:'7',name:'デル-7'},{n:'10',name:'デル-10'}],
  red:[{n:'1',name:'赤GK',gk:true},{n:'9',name:'赤-9'},{n:'11',name:'赤-11'},{n:'6',name:'赤-6'}]
};
function lineup(team,n){ const r=ROSTER[team];
  if(n===1) return [r.find(p=>p.n==='6')||r[1]];
  if(n===3) return [r[0],r[1],r[2]]; return r.slice(0,4); }
function slots(n){
  if(n===1) return [{x:L*0.35,y:Wd/2}];
  if(n===3) return [{x:L*0.06,y:Wd/2},{x:L*0.30,y:Wd*0.30},{x:L*0.30,y:Wd*0.70}];
  return [{x:L*0.06,y:Wd/2},{x:L*0.26,y:Wd*0.25},{x:L*0.42,y:Wd*0.5},{x:L*0.26,y:Wd*0.75}]; }

const cv=document.getElementById('cv');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0;  // 白飛び防止
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x2b323d);
const camera=new THREE.PerspectiveCamera(55,1,0.05,400);
scene.add(new THREE.HemisphereLight(0xffffff,0x8b9099,0.85));   // エコパ風に明るく（天井・壁も明るく）
scene.add(new THREE.AmbientLight(0xffffff,0.55));
// 天井灯（上から）＋影
const dl=new THREE.DirectionalLight(0xffffff,0.8); dl.position.set(4,32,8); dl.castShadow=true;
dl.shadow.mapSize.set(2048,2048); dl.shadow.camera.near=2; dl.shadow.camera.far=90;
dl.shadow.camera.left=-22; dl.shadow.camera.right=22; dl.shadow.camera.top=16; dl.shadow.camera.bottom=-16; dl.shadow.bias=-0.0006;
scene.add(dl);

// ===== 体育館の床（木目）＋壁 =====
function woodTex(base){ const c=document.createElement('canvas'); c.width=c.height=512; const x=c.getContext('2d');
  x.fillStyle=base; x.fillRect(0,0,512,512);
  for(let py=0;py<512;py+=42){ const v=Math.random()*22-11;
    x.fillStyle='rgba('+(v>0?'255,255,255':'0,0,0')+','+(Math.abs(v)/130)+')'; x.fillRect(0,py,512,42);
    x.strokeStyle='rgba(50,30,15,.35)'; x.lineWidth=2; x.beginPath();x.moveTo(0,py);x.lineTo(512,py);x.stroke();
    x.strokeStyle='rgba(60,40,20,.10)'; for(let gx=2;gx<512;gx+=6){ x.beginPath(); x.moveTo(gx,py+3); x.lineTo(gx+(Math.random()*3-1.5),py+39); x.stroke(); } }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=4; return t; }
// ── エコパアリーナ風：広く明るい体育館。中央にコート1面、周囲は開放的なメープル床、外周に段状の観客席 ──
const gymTex=woodTex('#d6b475'); gymTex.repeat.set(HALLX/3,HALLZ/3);   // 明るいメープル床（アリーナ全域）
const gymFloor=new THREE.Mesh(new THREE.PlaneGeometry(HALLX,HALLZ), new THREE.MeshStandardMaterial({map:gymTex,roughness:.7,metalness:.03}));
gymFloor.rotation.x=-Math.PI/2; gymFloor.position.y=-0.02; gymFloor.receiveShadow=true; scene.add(gymFloor);
// 外周のグレーコンクリート腰壁（アリーナ床の縁を囲む）
const wallMat=new THREE.MeshStandardMaterial({color:0xcccdd2,roughness:1});
function wall(w,d,x,z){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,3.4,d),wallMat); m.position.set(x,1.7,z); scene.add(m); }
wall(HALLX,0.4,0,-HALLZ/2); wall(HALLX,0.4,0,HALLZ/2); wall(0.4,HALLZ,-HALLX/2,0); wall(0.4,HALLZ,HALLX/2,0);
// 段状スタンド：腰壁の外・高い位置から後方へ立ち上がるスタジアム型ボウル（ティール席＋グレー立上り）
(function buildStands(){ const seatMat=new THREE.MeshStandardMaterial({color:0x2f7d6e,roughness:.85});
  const fasciaMat=new THREE.MeshStandardMaterial({color:0xdcdee2,roughness:.95});
  const rows=8, step=1.4, rise=0.75, y0=3.4, back=1.2, WX=HALLX+22, WZ=HALLZ+22;
  for(const s of [1,-1]) for(let r=0;r<rows;r++){ const z=s*(HALLZ/2+back+r*step), y=y0+r*rise;   // 長辺(±z)
    const f=new THREE.Mesh(new THREE.BoxGeometry(WX,rise,step),fasciaMat); f.position.set(0,y,z); scene.add(f);
    const st=new THREE.Mesh(new THREE.BoxGeometry(WX,0.16,step*0.6),seatMat); st.position.set(0,y+rise/2+0.09,z-s*step*0.18); scene.add(st); }
  for(const s of [1,-1]) for(let r=0;r<rows;r++){ const x=s*(HALLX/2+back+r*step), y=y0+r*rise;   // 短辺(±x)
    const f=new THREE.Mesh(new THREE.BoxGeometry(step,rise,WZ),fasciaMat); f.position.set(x,y,0); scene.add(f);
    const st=new THREE.Mesh(new THREE.BoxGeometry(step*0.6,0.16,WZ),seatMat); st.position.set(x-s*step*0.18,y+rise/2+0.09,0); scene.add(st); }
})();
// エコパ風の緩やかなアーチ天井（明るいグレー・高い位置。俯瞰では天井より上にカメラがあり隠れ、1人称で見上げると見える）
(function buildRoof(){ const R=55;
  const roof=new THREE.Mesh(new THREE.CylinderGeometry(R,R,HALLZ+30,64,1,true,Math.PI,Math.PI), new THREE.MeshStandardMaterial({color:0xeef0f3,roughness:.95,metalness:.03,side:THREE.BackSide,emissive:0xf2f4f7,emissiveIntensity:0.12}));
  roof.rotation.x=Math.PI/2; roof.position.set(0,20-R,0); scene.add(roof);
})(); // 梁は俯瞰カメラの視線に縦帯として写り込むため省略。アーチ天井のみ（1人称で見上げると見える）

// 共用の簡易人物（観客・運営・選手）
function makePerson(shirt){ const g=new THREE.Group();
  const torso=new THREE.Mesh(new THREE.BoxGeometry(0.36,0.5,0.28), new THREE.MeshStandardMaterial({color:shirt,roughness:.85})); torso.position.y=0.78; torso.castShadow=true; g.add(torso);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.14,12,10), new THREE.MeshStandardMaterial({color:0xf0c8a0,roughness:.9})); head.position.y=1.12; head.castShadow=true; g.add(head);
  return g; }
function person(color,x,z,ry){ const g=makePerson(color); g.position.set(x,0,z); if(ry)g.rotation.y=ry; scene.add(g); return g; }
function chairProp(color,x,z){ const m=new THREE.Mesh(new THREE.BoxGeometry(2*HX,0.45,2*HY), new THREE.MeshStandardMaterial({color,roughness:.7})); m.position.set(x,0.32,z); m.castShadow=true; scene.add(m); }
function timerTex(){ const c=document.createElement('canvas'); c.width=256;c.height=96; const x=c.getContext('2d'); x.fillStyle='#000';x.fillRect(0,0,256,96); x.fillStyle='#19ff5a';x.font='bold 58px monospace';x.textAlign='center';x.textBaseline='middle';x.fillText('20:00',128,52); return new THREE.CanvasTexture(c); }
(function buildArena(){ const OFFZ=-Wd/2-2;
  const table=new THREE.Mesh(new THREE.BoxGeometry(3,0.74,1), new THREE.MeshStandardMaterial({color:0x4a3520})); table.position.set(0,0.37,OFFZ-0.3); table.castShadow=true; scene.add(table);
  const post=new THREE.Mesh(new THREE.BoxGeometry(0.1,1.0,0.1), new THREE.MeshStandardMaterial({color:0x333})); post.position.set(2.6,0.5,OFFZ-0.2); scene.add(post);
  const tboard=new THREE.Mesh(new THREE.PlaneGeometry(1.4,0.55), new THREE.MeshBasicMaterial({map:timerTex(),side:THREE.DoubleSide})); tboard.position.set(2.6,1.15,OFFZ-0.15); scene.add(tboard);
  person(0xffffff,-0.6,OFFZ-0.9); person(0xffffff,0.6,OFFZ-0.9);
  function bench(cx,teamCol){ const b=new THREE.Mesh(new THREE.BoxGeometry(4,0.1,0.5), new THREE.MeshStandardMaterial({color:0x6b4423})); b.position.set(cx,0.42,OFFZ-0.1); scene.add(b);
    person(0x222222,cx-1.5,OFFZ-0.3); person(teamCol,cx-0.3,OFFZ-0.3); person(teamCol,cx+0.9,OFFZ-0.3);
    chairProp(teamCol,cx+0.2,OFFZ+1.0); chairProp(teamCol,cx+1.6,OFFZ+1.0); }
  bench(7,0x2d8a3d); bench(-7,0xd24a45);
  person(0xffd000,0,Wd/2+1.4,Math.PI); person(0xffd000,-9,Wd/2+1.2,Math.PI); person(0xffd000,9,Wd/2+1.2,Math.PI);
  // 観客は処理軽量化のため省略（運営・ベンチ・審判のみ）
})();

// ===== コート床（線）＝木目の上の塗装ライン =====
function courtTexture(){ const c=document.createElement('canvas'); const S=40; c.width=L*S; c.height=Wd*S; const x=c.getContext('2d');
  x.fillStyle='#caa06a'; x.fillRect(0,0,c.width,c.height);
  for(let py=0;py<c.height;py+=44){ const v=Math.random()*16-8; x.fillStyle='rgba('+(v>0?'255,255,255':'0,0,0')+','+(Math.abs(v)/150)+')'; x.fillRect(0,py,c.width,44); }
  x.strokeStyle='rgba(255,255,255,.95)'; x.lineWidth=5; x.strokeRect(10,10,c.width-20,c.height-20);
  x.beginPath(); x.moveTo(c.width/2,10); x.lineTo(c.width/2,c.height-10); x.stroke();
  x.beginPath(); x.arc(c.width/2,c.height/2,3*S,0,7); x.stroke();
  // コーナー(直線・各隅を約1mでカット)
  const d=0.7*S, W=c.width, H=c.height;
  x.beginPath(); x.moveTo(10+d,10); x.lineTo(10,10+d); x.stroke();               // 左上
  x.beginPath(); x.moveTo(W-10-d,10); x.lineTo(W-10,10+d); x.stroke();           // 右上
  x.beginPath(); x.moveTo(10+d,H-10); x.lineTo(10,H-10-d); x.stroke();           // 左下
  x.beginPath(); x.moveTo(W-10-d,H-10); x.lineTo(W-10,H-10-d); x.stroke();       // 右下
  x.lineWidth=4; x.strokeStyle='rgba(45,138,61,.7)'; x.strokeRect(10,(Wd/2-PB_HALF)*S,PB_DEPTH*S,PB_HALF*2*S);
  x.strokeStyle='rgba(210,74,69,.65)'; x.strokeRect(c.width-10-PB_DEPTH*S,(Wd/2-PB_HALF)*S,PB_DEPTH*S,PB_HALF*2*S);
  const t=new THREE.CanvasTexture(c); t.anisotropy=4; return t; }
const courtFloor=new THREE.Mesh(new THREE.PlaneGeometry(L,Wd), new THREE.MeshStandardMaterial({map:courtTexture(),roughness:.9}));
courtFloor.rotation.x=-Math.PI/2; courtFloor.position.y=0.005; courtFloor.receiveShadow=true; scene.add(courtFloor);
function goal(xEnd,color){ const mat=new THREE.MeshStandardMaterial({color});
  [gTop,gBot].forEach(z=>{ const p=new THREE.Mesh(new THREE.CylinderGeometry(.12,.12,1.2,10),mat); p.position.set(xEnd-L/2,.6,z-Wd/2); p.castShadow=true; scene.add(p); }); }
goal(0,0x2d8a3d); goal(L,0xd24a45);

// ボール（白＋黒パネルで視認性UP・実寸32.5cm）＋影
function ballTexture(){ const c=document.createElement('canvas'); c.width=c.height=128; const x=c.getContext('2d');
  x.fillStyle='#f5f5f5'; x.fillRect(0,0,128,128);
  x.fillStyle='#1a1a1a'; for(const[px,py]of [[64,30],[28,70],[100,70],[46,108],[82,108],[64,128]]){ x.beginPath(); for(let k=0;k<5;k++){const a=k/5*6.283-1.57; x.lineTo(px+Math.cos(a)*15,py+Math.sin(a)*15);} x.closePath(); x.fill(); }
  x.strokeStyle='#888'; x.lineWidth=2; x.strokeRect(1,1,126,126);
  return new THREE.CanvasTexture(c); }
function numberSprite(txt,bg){ const c=document.createElement('canvas'); c.width=c.height=64; const x=c.getContext('2d');

function chaser(team){ let best=null,bd=1e9; cs.forEach(c=>{if(c.tm!==team||c.role==='gk')return; const d=dist(c); if(d<bd){bd=d;best=c;}}); return best||cs.find(c=>c.tm===team); }
function aiSteer(c,tx,ty,stop){ const dx=tx-c.x,dy=ty-c.y,d=Math.hypot(dx,dy),ang=Math.atan2(dy,dx),diff=nA(ang-c.th);
  if(d<(stop||0.4)){ c.thr=0; c.turn=Math.max(-1,Math.min(1,diff*1.2)); return; }
  if(Math.abs(diff)>2.0){ c.thr=-0.8; c.turn=Math.max(-1,Math.min(1,nA(ang-Math.PI-c.th)*1.8)); }      // 後方=バックで寄せる
  else { c.turn=Math.max(-1,Math.min(1,diff*1.8)); c.thr=Math.abs(diff)<0.9?Math.min(1,0.45+d*0.25):0.15; } }
function ai(c,chB,chR){ const ch=c.tm==='blue'?chB:chR;
  if(mode.practice&&c.tm==='red'){ c.thr=0; c.turn=0; return; }   // 練習のGKは動かない
  const ownGoal=c.tm==='blue'?{x:0,y:Wd/2}:{x:L,y:Wd/2};
  if(c.role==='gk'&&mode.n>1){ const gx=c.tm==='blue'?L*0.04:L*0.96, gy=Math.max(gTop+0.4,Math.min(gBot-0.4,ball.y)); aiSteer(c,gx,gy,0.25); return; }
  if(c===ch){ // ボールに張り付かず、自ゴール側に約2.2m離れてマーク（操作スペースを残す）
    let gx=ownGoal.x-ball.x, gy=ownGoal.y-ball.y, gl=Math.hypot(gx,gy)||1; const mark=2.2;
    aiSteer(c, ball.x+gx/gl*mark, ball.y+gy/gl*mark, 0.7); return; }
  const tX=ownGoal.x+(ball.x-ownGoal.x)*0.55, tY=ball.y*0.6+c.hy*0.4;
  aiSteer(c, tX, Math.max(1,Math.min(Wd-1,tY)), 0.8); }

function humanInput(){ let thr=0,turn=0;
  if(joy.active){ const m=Math.hypot(joy.x,joy.y); if(m>=0.08){ const adj=Math.min(1,(m-0.08)/0.92), r=Math.pow(adj,1.7)/m; thr=-joy.y*r; turn=joy.x*r; } }
  else { let kx=0,ky=0; if(keys['w']||keys['arrowup'])ky-=1; if(keys['s']||keys['arrowdown'])ky+=1; if(keys['a']||keys['arrowleft'])kx-=1; if(keys['d']||keys['arrowright'])kx+=1;
    if(kx||ky){const m=Math.hypot(kx,ky); thr=-ky/m; turn=kx/m;} } return {thr,turn}; }
function redKeyInput(){ let kx=0,ky=0; if(keys['arrowup'])ky-=1; if(keys['arrowdown'])ky+=1; if(keys['arrowleft'])kx-=1; if(keys['arrowright'])kx+=1;
  if(kx||ky){const m=Math.hypot(kx,ky); return {thr:-ky/m,turn:kx/m};} return {thr:0,turn:0}; }

function step(dt){
  ctrlBlue=pickControlled('blue',ctrlBlue); ctrlRed=mode.twoP?pickControlled('red',ctrlRed):null;
  const chB=chaser('blue'), chR=chaser('red'); const hi=humanInput(), ri=mode.twoP?redKeyInput():null;
  cs.forEach(c=>{ if(c===ctrlBlue){c.thr=hi.thr;c.turn=hi.turn;} else if(c===ctrlRed){c.thr=ri.thr;c.turn=ri.turn;} else ai(c,chB,chR); });
  if(mode.ptype==='pass'&&ctrlBlue)ctrlBlue.thr=0;   // パス回転練習は移動せず回転だけ
  cs.forEach(c=>updChair(c,dt)); sep();
  ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;
  const sp=Math.hypot(ball.vx,ball.vy); if(sp>0){const ns=Math.max(0,sp-BDEC*dt);ball.vx*=ns/sp;ball.vy*=ns/sp;}
  if(mode.ptype==='pass'){ stepPass(dt); return; }   // パスはマルチボール処理
  const preSp=Math.hypot(ball.vx,ball.vy);
  cs.forEach(c=>resolve(c,ball));
  const postSp=Math.hypot(ball.vx,ball.vy);
  if(postSp-preSp>0.4&&kickCool<=0){ playKick(postSp-preSp); kickCool=0.08; }   // 相手の接触でも鳴る
  if(kickCool>0)kickCool-=dt;
  // ゴール ＆ ライン外＝出た地点で停止して再スタート
  if(mode.practice){
    if(ball.x+BR>L && ball.y>gTop && ball.y<gBot){ practiceMade++; goalCelebrate(); practiceI++; placeBallPreset(); feedTimer=0; return; }   // 決めたら次へ
    if(ball.x+BR>L||ball.x-BR<0||ball.y-BR<0||ball.y+BR>Wd){ placeBallPreset(); feedTimer=0; return; }                          // 外したら次へ
    if(mode.ptype==='pass'){ feedTimer+=dt; if(feedTimer>=3 || (feedTimer>0.6 && Math.hypot(ball.vx,ball.vy)<0.3)){ placeBallPreset(); feedTimer=0; } }  // 3秒ごと(or止まれば)に角度を変えて供給
  } else {
    if(ball.x-BR<0){ if(ball.y>gTop&&ball.y<gBot){sA++;goalCelebrate();place();return;} ball.x=BR+0.02; ball.vx=0;ball.vy=0; }
    if(ball.x+BR>L){ if(ball.y>gTop&&ball.y<gBot){sB++;goalCelebrate();place();return;} ball.x=L-BR-0.02; ball.vx=0;ball.vy=0; }
    if(ball.y-BR<0){ ball.y=BR+0.02; ball.vx=0;ball.vy=0; }
    if(ball.y+BR>Wd){ ball.y=Wd-BR-0.02; ball.vx=0;ball.vy=0; }
  }
  if(lastHit)lastHit.t-=dt;
}

// ===== 描画 =====
function mX(wx){return wx-L/2;} function mZ(wy){return wy-Wd/2;}
function updateRule(){ // 戦術ボードの3mルール可視化
  const tac=!!(mode&&mode.tac); ballRing.visible=tac;
  if(tac) ballRing.position.set(mX(ball.x),0.03,mZ(ball.y));
  cs.forEach(c=>{ const sr=c.mesh.userData.statusRing; if(!tac){sr.visible=false;return;} sr.visible=false; });
  if(!tac) return;
  ['blue','red'].forEach(team=>{
    const near=cs.filter(c=>c.tm===team && !(c.role==='gk'&&inOwnBox(c)) && dist(c)<3);
    near.forEach(c=>{ const sr=c.mesh.userData.statusRing; sr.visible=true; sr.material.color.setHex(near.length>=2?0xe24b4a:0x39d353); });
  });
}
function syncMeshes(){
  cs.forEach(c=>{ c.mesh.position.set(mX(c.x+Math.cos(c.th)*REAR),0,mZ(c.y+Math.sin(c.th)*REAR)); c.mesh.rotation.y=-c.th;
    const hideSelf=(view==='fps'&&c===fpsChair()); if(c.mesh.userData.person)c.mesh.userData.person.visible=!hideSelf; if(c.mesh.userData.sprite)c.mesh.userData.sprite.visible=!hideSelf; });
  if(mode&&mode.ptype==='pass'){ ballMesh.visible=false; pballs.forEach(b=>{ const m=pballMeshes[b.mi]; m.visible=true; m.position.set(mX(b.x),BR,mZ(b.y)); }); }
  else { ballMesh.visible=true; ballMesh.position.set(mX(ball.x),BR,mZ(ball.y)); }
  ringB.visible=!!ctrlBlue&&view!=='fps'; if(ctrlBlue)ringB.position.set(mX(ctrlBlue.x+Math.cos(ctrlBlue.th)*REAR),0.06,mZ(ctrlBlue.y+Math.sin(ctrlBlue.th)*REAR));
  ringR.visible=!!ctrlRed&&view!=='fps'; if(ctrlRed)ringR.position.set(mX(ctrlRed.x+Math.cos(ctrlRed.th)*REAR),0.06,mZ(ctrlRed.y+Math.sin(ctrlRed.th)*REAR));
  const tac=!!(mode&&mode.tac);
  aim.visible=tac&&!!selected; if(tac&&selected){ aim.position.set(mX(selected.x+Math.cos(selected.th)*1.5),0.3,mZ(selected.y+Math.sin(selected.th)*1.5)); aim.rotation.set(Math.PI/2,0,-selected.th-Math.PI/2); }
  updateRule();
  const cp=document.getElementById('coach'); if(tac){ cp.style.display='block'; cp.innerHTML=coachHTML(); } else cp.style.display='none';
  document.getElementById('score').textContent = mode.practice ? ((mode.ptype==='pass'?'パス&回転シュート　':'シュート練習　')+'成功 '+practiceMade+' 本') : ('緑 '+sA+' - '+sB+' 赤   '+mode.n+'対'+mode.n);
  if(tac&&selected){ const d=dist(selected).toFixed(1); document.getElementById('info').innerHTML='選択: #'+selected.num+' '+selected.name+'<br>ボールまで '+d+' m '+(selected.role==='gk'&&inOwnBox(selected)?'(GK例外)':(dist(selected)<3?'(3m内)':'(3m外)'))+'<br>向き調整=黄コーンをドラッグ'; }
  else { const c=ctrlBlue; if(c)document.getElementById('info').innerHTML='操作: #'+c.num+' '+c.name+'<br>車速 '+Math.abs(c.spd).toFixed(1)+' m/s<br>回転 '+c.om.toFixed(1)+' rad/s<br>ボール '+Math.hypot(ball.vx,ball.vy).toFixed(1)+' m/s'; }
}

// ===== カメラ =====
let view='over', orient='land';
function fpsChair(){ return ctrlBlue||selected||cs.find(x=>x.tm==='blue'&&x.role!=='gk')||cs[0]||null; }  // 戦術中(停止)も視点対象を確保
function updateCamera(){
  const zt=zoomMode?(zoomMode===1?-L/4:L/4):0; const z=zt!==0;  // 拡大は全モードで有効
  const _fc=fpsChair();
  if(view==='fps'&&_fc){ const c=_fc, yaw=c.th+eyeYaw;
    // 目線を座席(幾何中心の少し後ろ)・上に置き、常に自分の車椅子前方(ガード)が下に映るようにする
    const gx=c.x+Math.cos(c.th)*REAR, gy=c.y+Math.sin(c.th)*REAR;
    const ex=mX(gx)-Math.cos(c.th)*0.25, ez=mZ(gy)-Math.sin(c.th)*0.25, ey=1.55;
    camera.up.set(0,1,0); camera.position.set(ex,ey,ez);
    const D=4, tx=ex+Math.cos(yaw)*D, tz=ez+Math.sin(yaw)*D, ty=ey+Math.tan(eyePitch)*D;
    camera.lookAt(tx,ty,tz);
  } else if(view==='top'){ camera.up.set(orient==='land'?0:1,0,orient==='land'?-1:0);   // 縦は緑(自分)を下=上向き攻撃に
    camera.position.set(zt,z?20:34,0.001); camera.lookAt(zt,0,0);
  } else { const az=orient==='land'?0:-Math.PI/2, r=z?12:21, h=z?15:24; camera.up.set(0,1,0);   // 縦は緑を手前(下)に
    camera.position.set(zt+Math.sin(az)*r,h,Math.cos(az)*r+(orient==='land'?3:0)); camera.lookAt(zt,0,0); }
}
function resize(){ const w=cv.clientWidth,h=cv.clientHeight; renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }

// ===== サウンド（Web Audio合成・ファイル不要）=====
let ac=null, motorGain=null, mOsc=null, mOsc2=null;
function initAudio(){ if(ac){ if(ac.state==='suspended')ac.resume(); return; }
  try{ ac=new (window.AudioContext||window.webkitAudioContext)();
    motorGain=ac.createGain(); motorGain.gain.value=0;
    const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=520;
    mOsc=ac.createOscillator(); mOsc.type='sawtooth'; mOsc.frequency.value=70;
    mOsc2=ac.createOscillator(); mOsc2.type='square'; mOsc2.frequency.value=140;
    mOsc.connect(f); mOsc2.connect(f); f.connect(motorGain); motorGain.connect(ac.destination);
    mOsc.start(); mOsc2.start();
  }catch(e){ ac=null; } }
addEventListener('pointerdown',initAudio); addEventListener('keydown',initAudio);
function motorAudio(){ if(!ac||!motorGain)return; const c=ctrlBlue; const drive=c?Math.min(1,Math.abs(c.spd)/SPEED+Math.abs(c.om)/MO*0.5):0;
  motorGain.gain.setTargetAtTime(0.0004+drive*0.045, ac.currentTime, 0.05);
  const fr=58+drive*120; mOsc.frequency.setTargetAtTime(fr,ac.currentTime,0.05); mOsc2.frequency.setTargetAtTime(fr*2,ac.currentTime,0.05); }
function playKick(strength){ if(!ac)return; const t=ac.currentTime, v=Math.min(1,strength/4), dur=0.1+v*0.06;
  const n=Math.floor(ac.sampleRate*dur), buf=ac.createBuffer(1,n,ac.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2);
  const src=ac.createBufferSource(); src.buffer=buf; const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=240+v*500; bp.Q.value=0.9;
  const ng=ac.createGain(); ng.gain.value=0.12+v*0.5; src.connect(bp); bp.connect(ng); ng.connect(ac.destination); src.start(t);
  const osc=ac.createOscillator(); osc.type='sine'; osc.frequency.setValueAtTime(130+v*130,t); osc.frequency.exponentialRampToValueAtTime(55,t+dur);
  const og=ac.createGain(); og.gain.setValueAtTime(0.18+v*0.45,t); og.gain.exponentialRampToValueAtTime(0.001,t+dur);
  osc.connect(og); og.connect(ac.destination); osc.start(t); osc.stop(t+dur+0.02); }
function playWhistle(){ if(!ac)return; const t=ac.currentTime;
  for(const f of [2200,2650]){ const o=ac.createOscillator(); o.type='square'; o.frequency.setValueAtTime(f,t);
    const g=ac.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.1,t+0.02); g.gain.setValueAtTime(0.1,t+0.22); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+0.47); } }
function cheer(){ if(!ac)return; const t=ac.currentTime, dur=1.3, n=Math.floor(ac.sampleRate*dur), buf=ac.createBuffer(1,n,ac.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1);
  const src=ac.createBufferSource(); src.buffer=buf; const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=0.6;
  const g=ac.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.2,t+0.3); g.gain.linearRampToValueAtTime(0.14,t+0.8); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(bp); bp.connect(g); g.connect(ac.destination); src.start(t); }
function speak(txt){ try{ if(!window.speechSynthesis)return; const u=new SpeechSynthesisUtterance(txt); u.lang='ja-JP'; u.rate=1.0; u.pitch=1.3; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){} }
function goalCelebrate(){ playWhistle(); cheer(); speak('ゴーーール！'); }

const hstep=1/120; let acc=0, last=performance.now();
function driveFps(dt){ const c=fpsChair(); if(!c)return; const hi=humanInput(); c.thr=hi.thr; c.turn=hi.turn; updChair(c,dt);  // 戦術停止中も自分の視点機だけ運転＆ボールを押せる
  resolve(c,ball); ball.x+=ball.vx*dt; ball.y+=ball.vy*dt; const sp=Math.hypot(ball.vx,ball.vy); if(sp>0){const ns=Math.max(0,sp-BDEC*dt);ball.vx*=ns/sp;ball.vy*=ns/sp;}
  if(ball.x<BR){ball.x=BR;ball.vx=Math.abs(ball.vx)*0.5;} if(ball.x>L-BR){ball.x=L-BR;ball.vx=-Math.abs(ball.vx)*0.5;}
  if(ball.y<BR){ball.y=BR;ball.vy=Math.abs(ball.vy)*0.5;} if(ball.y>Wd-BR){ball.y=Wd-BR;ball.vy=-Math.abs(ball.vy)*0.5;} }
function loop(t){ let dt=(t-last)/1000; last=t; dt=Math.min(dt,0.05);
  if(!paused){acc+=dt;let n=0;while(acc>=hstep&&n<8){step(hstep);acc-=hstep;n++;}}
  else if(mode.tac){ driveFps(dt); }   // 戦術ボードは停止中でも自分の視点機は動かせる
  // ボールの転がり：速度ベクトルに直交する水平軸まわりに |v|/r で回転（停止中は回らない）
  { const sp=Math.hypot(ball.vx,ball.vy); if(sp>1e-3){ rollAxis.set(ball.vy,0,-ball.vx).normalize(); ballMesh.rotateOnWorldAxis(rollAxis, sp*dt/BR); } }
  motorAudio(); syncMeshes(); updateCamera(); renderer.render(scene,camera); requestAnimationFrame(loop); }

addEventListener('keydown',e=>{const k=e.key.toLowerCase(); if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)){keys[k]=true;e.preventDefault();}});
addEventListener('keyup',e=>{const k=e.key.toLowerCase(); if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)){keys[k]=false;}});
const joyEl=document.getElementById('joy'), knob=document.getElementById('knob'); const JR=78;
function joySet(ev){ const r=joyEl.getBoundingClientRect(); let dx=ev.clientX-(r.left+r.width/2), dy=ev.clientY-(r.top+r.height/2);
  const m=Math.hypot(dx,dy); if(m>JR){dx*=JR/m;dy*=JR/m;} knob.style.transform='translate('+dx+'px,'+dy+'px)'; joy.x=dx/JR; joy.y=dy/JR; joy.active=true; }
function joyEnd(){ joy.x=0;joy.y=0;joy.active=false; knob.style.transform='translate(0,0)'; }
// スティックを押したら、指/カーソルが円から離れても操作継続（精密操作しやすく）
let joyId=null;
joyEl.addEventListener('pointerdown',e=>{ e.preventDefault(); joyId=e.pointerId; joySet(e); });
window.addEventListener('pointermove',e=>{ if(joyId!==null&&e.pointerId===joyId){ e.preventDefault(); joySet(e); } });
window.addEventListener('pointerup',e=>{ if(joyId!==null&&e.pointerId===joyId){ joyId=null; joyEnd(); } });
window.addEventListener('pointercancel',e=>{ if(joyId!==null&&e.pointerId===joyId){ joyId=null; joyEnd(); } });

// 将来: Cloudflare Workers(WebSocket/Durable Object)で serialize() を配信し合えばリアルタイム共有可能
function serialize(){ return btoa(unescape(encodeURIComponent(JSON.stringify({
  m:mode.key,o:orient,b:[+ball.x.toFixed(2),+ball.y.toFixed(2)],
  c:cs.map(c=>[c.tm[0],c.num,+c.x.toFixed(2),+c.y.toFixed(2),+c.th.toFixed(2)]) })))); }
function applyState(o){ try{ start(MODES[o.m]||MODES['4v4']); if(o.o)orient=o.o; document.getElementById('orient').textContent=orient==='land'?'縦型にする':'横型にする';
  ball.x=+o.b[0];ball.y=+o.b[1]; (o.c||[]).forEach((d,i)=>{ if(cs[i]){cs[i].x=+d[2];cs[i].y=+d[3];cs[i].th=+d[4];} }); paused=true; document.getElementById('play').textContent='再生'; }catch(e){} }
document.getElementById('share').addEventListener('click',function(){ const url=location.origin+location.pathname+'#s='+serialize();
  const b=this; if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>{b.textContent='コピー済';setTimeout(()=>b.textContent='共有リンク',1500);});} else { location.hash='s='+serialize(); b.textContent='URL更新';setTimeout(()=>b.textContent='共有リンク',1500);} });
function loadHash(){ if(location.hash.indexOf('#s=')===0){ try{ applyState(JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(3)))))); }catch(e){} } }

// ===== ポインタ（戦術ドラッグ＆回転 / 1人称ルック）=====
const ray=new THREE.Raycaster(), ndc=new THREE.Vector2(); let drag=null, look=null;
function pickWorld(ev){ const r=cv.getBoundingClientRect(); ndc.x=((ev.clientX-r.left)/r.width)*2-1; ndc.y=-((ev.clientY-r.top)/r.height)*2+1;
  ray.setFromCamera(ndc,camera); const hit=new THREE.Vector3(); ray.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0,1,0),0),hit);
  return hit?{x:hit.x+L/2,y:hit.z+Wd/2}:null; }
function pickPiece(ev){ const r=cv.getBoundingClientRect(); ndc.x=((ev.clientX-r.left)/r.width)*2-1; ndc.y=-((ev.clientY-r.top)/r.height)*2+1; ray.setFromCamera(ndc,camera);
  if(selected&&aim.visible&&ray.intersectObject(aim,true).length) return 'rot';   // 向き変更ハンドル
  const fc=fpsChair(); const hits=ray.intersectObjects(cs.filter(c=>c!==fc).map(c=>c.mesh).concat([ballMesh]),true);  // 実メッシュを直接掴む(自分の視点機は除外)
  if(!hits.length)return null; let o=hits[0].object; while(o){ if(o===ballMesh)return ball; const f=cs.find(c=>c.mesh===o); if(f)return f; o=o.parent; } return null; }
cv.addEventListener('pointerdown',ev=>{
  if(view==='fps'){
    if(mode.tac){ const p=pickPiece(ev);   // 1人称＋戦術：駒/ボール/向きハンドルに当たれば操作、何もない所は視点回し
      if(p==='rot'){ drag={k:'rot'}; cv.setPointerCapture(ev.pointerId); return; }
      if(p===ball){ drag={k:'mv',o:ball}; cv.setPointerCapture(ev.pointerId); return; }
      if(p){ selected=p; drag={k:'mv',o:p}; cv.setPointerCapture(ev.pointerId); return; }
    }
    look={x:ev.clientX,y:ev.clientY}; cv.setPointerCapture(ev.pointerId); return; }
  if(mode.ptype==='pass'){ const w=pickWorld(ev); if(w){ let best=null,bd=2.5; cs.forEach(c=>{const d=Math.hypot(c.x-w.x,c.y-w.y);if(d<bd){bd=d;best=c;}}); if(best){ drag={k:'mv',o:best}; cv.setPointerCapture(ev.pointerId); } } return; }  // パス練習:自分もGKもドラッグ移動
  if(!(paused&&(mode.tac||mode.practice))){ // 通常プレイ：青機体をタップで操作対象に固定
    const w=pickWorld(ev); if(w){ let best=null,bd=1.4; cs.forEach(c=>{if(c.tm!=='blue')return; const d=Math.hypot(c.x-w.x,c.y-w.y); if(d<bd){bd=d;best=c;}}); if(best)setManual(best); }
    return; }
  const w=pickWorld(ev); if(!w)return;
  if(selected){ const hx=selected.x+Math.cos(selected.th)*1.5, hy=selected.y+Math.sin(selected.th)*1.5;
    if(Math.hypot(hx-w.x,hy-w.y)<0.85){ drag={k:'rot'}; cv.setPointerCapture(ev.pointerId); return; } }
  let best=null,bd=1.1; cs.forEach(c=>{const d=Math.hypot(c.x-w.x,c.y-w.y);if(d<bd){bd=d;best=c;}});
  if(best){ selected=best; drag={k:'mv',o:best}; cv.setPointerCapture(ev.pointerId); return; }
  if(Math.hypot(ball.x-w.x,ball.y-w.y)<1.1){ drag={k:'mv',o:ball}; cv.setPointerCapture(ev.pointerId); return; }
  selected=null;
});
cv.addEventListener('pointermove',ev=>{
  if(view==='fps'&&look){ eyeYaw+=(ev.clientX-look.x)*0.005; eyePitch-=(ev.clientY-look.y)*0.005; eyePitch=Math.max(-1.0,Math.min(0.25,eyePitch)); eyeYaw=Math.max(-1.6,Math.min(1.6,eyeYaw)); look={x:ev.clientX,y:ev.clientY}; return; }
  if(!drag)return; const w=pickWorld(ev); if(!w)return;
  if(drag.k==='rot'&&selected){ selected.th=Math.atan2(w.y-selected.y,w.x-selected.x); }
  else { const o=drag.o; o.x=Math.max(0.3,Math.min(L-0.3,w.x)); o.y=Math.max(0.3,Math.min(Wd-0.3,w.y)); if(o.spd!==undefined){o.spd=0;o.om=0;} }
});
cv.addEventListener('pointerup',()=>{drag=null;look=null;}); cv.addEventListener('pointercancel',()=>{drag=null;look=null;});

addEventListener('resize',resize);
start(MODES['4v4']); loadHash(); resize(); requestAnimationFrame(loop);
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>SFC Delteas 戦術ビューア 3D v1 - 2D感覚の立体版</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overscroll-behavior:none;background:#0a0a14;color:#fff;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;overflow:hidden;}
  #wrap{position:fixed;inset:0;}
  #cv{display:block;width:100%;height:100%;touch-action:none;}
  .top{position:fixed;top:8px;left:0;right:0;display:flex;justify-content:center;gap:6px;flex-wrap:wrap;z-index:10;padding:0 8px;}
  .btn{font:14px/1 inherit;border:1px solid rgba(255,255,255,.25);background:rgba(20,20,30,.7);color:#fff;border-radius:9px;padding:9px 12px;cursor:pointer;}
  .btn.on{background:#2f6fd6;border-color:#2f6fd6;}
  .btn:active{transform:scale(.96);}
  #score{position:fixed;top:54px;left:0;right:0;text-align:center;font-size:20px;font-weight:600;z-index:10;text-shadow:0 1px 3px #000;}
  #info{position:fixed;top:84px;left:10px;font:12px/1.5 monospace;background:rgba(0,0,0,.45);padding:6px 9px;border-radius:6px;z-index:10;}
  .pad{position:fixed;bottom:16px;z-index:10;display:flex;gap:10px;}
  #padL{left:14px;} #padR{right:14px;}
  .pbtn{width:60px;height:60px;font-size:26px;border:1px solid rgba(255,255,255,.25);background:rgba(20,20,30,.7);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .pbtn:active{background:#2f6fd6;}
  .ctl{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:8px;z-index:9;flex-wrap:wrap;pointer-events:none;}
  .ctl .btn{pointer-events:auto;background:rgba(20,20,30,.6);}
  #ver{position:fixed;right:6px;bottom:4px;z-index:11;font:11px/1 monospace;color:#fff;background:rgba(0,0,0,.4);padding:2px 6px;border-radius:4px;}
  #hint{position:fixed;bottom:88px;left:0;right:0;text-align:center;font-size:12px;color:rgba(255,255,255,.7);z-index:9;text-shadow:0 1px 2px #000;}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>
<div class="top" id="modes">
  <button class="btn" data-m="1v1">1対1</button>
  <button class="btn" data-m="3v3">3対3</button>
  <button class="btn on" data-m="4v4">4対4 公式</button>
  <button class="btn" data-m="tac">戦術ボード</button>
  <button class="btn" data-m="2p">2人対戦</button>
</div>
<div id="score">青 0 - 0 赤</div>
<div id="info"></div>
<div id="hint">回転(A/D)→ガード端で叩く=スピンキック ／ ↑↓←→・WASD</div>
<div class="ctl">
  <button class="btn" id="orient">縦型にする</button>
  <button class="btn" id="play">一時停止</button>
  <button class="btn" id="reset">配置リセット</button>
</div>
<div class="pad" id="padL"><button class="pbtn" id="bL">↺</button><button class="pbtn" id="bR">↻</button></div>
<div class="pad" id="padR"><button class="pbtn" id="bB">▼</button><button class="pbtn" id="bF">▲</button></div>
<div id="ver">3D v1 · 2026-06-18</div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ===== 実寸（メートル）=====
const L=30, Wd=18, GW=6, gTop=(Wd-GW)/2, gBot=(Wd+GW)/2;
const HX=0.65, HY=0.5, GUARD=0.12, BR=0.1625, EDGE=Math.hypot(HX+GUARD,HY);
let SPEED=2.78; const ACC=4, DEC=4, MO=2.6, AAC=9, ADC=7, BDEC=0.5, E=0.5, WE=0.55, CAP=12, GRIP=0.4;

// ===== ロスター（実チーム）=====
const ROSTER={
  blue:[{n:'1',name:'デルGK',gk:true},{n:'6',name:'中村(K)'},{n:'7',name:'デル-7'},{n:'10',name:'デル-10'}],
  red:[{n:'1',name:'赤GK',gk:true},{n:'9',name:'赤-9'},{n:'11',name:'赤-11'},{n:'6',name:'赤-6'}]
};
// モードごとの起用（GKは3v3/4v4のみ）
function lineup(team,n){
  const r=ROSTER[team];
  if(n===1) return [r.find(p=>p.n==='6')||r[1]];
  if(n===3) return [r[0], r[1], r[2]];
  return r.slice(0,4);
}
function slots(n){
  if(n===1) return [{x:L*0.35,y:Wd/2}];
  if(n===3) return [{x:L*0.06,y:Wd/2},{x:L*0.30,y:Wd*0.30},{x:L*0.30,y:Wd*0.70}];
  return [{x:L*0.06,y:Wd/2},{x:L*0.26,y:Wd*0.25},{x:L*0.42,y:Wd*0.5},{x:L*0.26,y:Wd*0.75}];
}

// ===== Three.js シーン =====
const cv=document.getElementById('cv');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0a0a14);
const camera=new THREE.PerspectiveCamera(48,1,0.1,500);
scene.add(new THREE.AmbientLight(0xffffff,0.85));
const dl=new THREE.DirectionalLight(0xffffff,0.7); dl.position.set(8,30,10); scene.add(dl);

// コート床（2Dと同じ線をテクスチャで描く）
function courtTexture(){
  const c=document.createElement('canvas'); const S=40; c.width=L*S; c.height=Wd*S; const x=c.getContext('2d');
  x.fillStyle='#cda06b'; x.fillRect(0,0,c.width,c.height);
  x.strokeStyle='rgba(255,255,255,.92)'; x.lineWidth=4;
  x.strokeRect(8,8,c.width-16,c.height-16);
  x.beginPath(); x.moveTo(c.width/2,8); x.lineTo(c.width/2,c.height-8); x.stroke();
  x.beginPath(); x.arc(c.width/2,c.height/2,3*S,0,7); x.stroke();
  x.strokeStyle='rgba(60,120,200,.55)'; x.lineWidth=3;
  x.strokeRect(8,(Wd/2-4.5)*S,4*S,9*S);
  x.strokeStyle='rgba(210,74,69,.55)'; x.strokeRect(c.width-8-4*S,(Wd/2-4.5)*S,4*S,9*S);
  const t=new THREE.CanvasTexture(c); t.anisotropy=4; return t;
}
const floor=new THREE.Mesh(new THREE.PlaneGeometry(L,Wd), new THREE.MeshStandardMaterial({map:courtTexture(),roughness:.95}));
floor.rotation.x=-Math.PI/2; scene.add(floor);
// ゴール
function goal(xEnd,color){ const g=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color});
  [gTop,gBot].forEach(z=>{ const p=new THREE.Mesh(new THREE.CylinderGeometry(.12,.12,1.2,10),mat); p.position.set(xEnd-L/2,.6,z-Wd/2); g.add(p); });
  const bar=new THREE.Mesh(new THREE.BoxGeometry(.1,.06,GW),mat); bar.position.set(xEnd-L/2,1.2,Wd/2-Wd/2); g.add(bar);
  scene.add(g);
}
goal(0,0x2f6fd6); goal(L,0xd24a45);

function numberSprite(txt,bg){
  const c=document.createElement('canvas'); c.width=c.height=64; const x=c.getContext('2d');
  x.fillStyle=bg; x.beginPath(); x.arc(32,32,30,0,7); x.fill();
  x.fillStyle='#fff'; x.font='bold 34px sans-serif'; x.textAlign='center'; x.textBaseline='middle'; x.fillText(txt,32,34);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),depthTest:false}));
  s.scale.set(.9,.9,.9); s.position.y=1.0; return s;
}
function makeChairMesh(team,label,gk){
  const g=new THREE.Group();
  const col=team==='blue'?0x2f6fd6:0xd24a45, dk=team==='blue'?0x17407f:0x8a2723;
  const body=new THREE.Mesh(new THREE.BoxGeometry(2*HX,0.45,2*HY), new THREE.MeshStandardMaterial({color: gk? (team==='blue'?0x6fa8ff:0xff8f8a):col, roughness:.7}));
  body.position.y=0.32; g.add(body);
  const guard=new THREE.Mesh(new THREE.BoxGeometry(GUARD*1.6,0.5,2*HY+0.1), new THREE.MeshStandardMaterial({color:dk}));
  guard.position.set(HX+GUARD*0.5,0.30,0); g.add(guard); // 前方=+X(local)
  const seat=new THREE.Mesh(new THREE.CylinderGeometry(.18,.18,.5,8), new THREE.MeshStandardMaterial({color:0x222222})); seat.position.set(-0.1,0.62,0); g.add(seat);
  g.add(numberSprite(label,dk));
  return g;
}

// 操作中リング
const ring=new THREE.Mesh(new THREE.TorusGeometry(EDGE*1.05,0.06,8,28), new THREE.MeshBasicMaterial({color:0xf5c518}));
ring.rotation.x=-Math.PI/2; ring.position.y=0.04; scene.add(ring);
// ボール
const ballMesh=new THREE.Mesh(new THREE.SphereGeometry(BR,20,16), new THREE.MeshStandardMaterial({color:0xffffff,roughness:.5}));
scene.add(ballMesh);

// ===== ゲーム状態 =====
let cs=[], ball, sA, sB, mode, paused=false, lastHit=null;
const inA={f:0,b:0,l:0,r:0}, inB={f:0,b:0,l:0,r:0}, inO={f:0,b:0,l:0,r:0};
function build(){
  cs.forEach(c=>scene.remove(c.mesh)); cs=[];
  const sl=slots(mode.n);
  ['blue','red'].forEach(team=>{
    const lu=lineup(team,mode.n);
    sl.forEach((s,i)=>{
      const sx = team==='blue'? s.x : L-s.x;
      const info=lu[i]||{n:'?',name:'?'};
      const mesh=makeChairMesh(team,info.n,!!info.gk); scene.add(mesh);
      cs.push({tm:team,role:info.gk?'gk':'fp',name:info.name,num:info.n,hx:sx,hy:s.y,
               x:sx,y:s.y,th:team==='blue'?0:Math.PI,spd:0,om:0,vx:0,vy:0,inp:{f:0,b:0,l:0,r:0},mesh});
    });
  });
  ball={x:L/2,y:Wd/2,vx:0,vy:0};
}
function place(){ cs.forEach(c=>{c.x=c.hx;c.y=c.hy;c.th=c.tm==='blue'?0:Math.PI;c.spd=0;c.om=0;c.vx=0;c.vy=0;}); ball.x=L/2;ball.y=Wd/2;ball.vx=0;ball.vy=0; lastHit=null; }
function start(mk){ mode=mk; sA=0;sB=0; build(); place(); paused=!!mode.tac;
  document.getElementById('play').textContent=paused?'再生':'一時停止';
  [...document.querySelectorAll('#modes .btn')].forEach(b=>b.classList.toggle('on',b.dataset.m===mode.key));
  document.getElementById('hint').textContent = mode.twoP? '1P=WASD ／ 2P=↑↓←→（各チームのボール最寄りを操作）'
    : (mode.tac? '戦術：選手やボールをドラッグ→「再生」で動き出す' : '回転(A/D)→ガード端で叩く=スピンキック ／ ↑↓←→・WASD');
}
const MODES={'1v1':{key:'1v1',n:1},'3v3':{key:'3v3',n:3},'4v4':{key:'4v4',n:4},'tac':{key:'tac',n:4,tac:true},'2p':{key:'2p',n:3,twoP:true}};

// ===== 物理（2Dウィジェットと同一・接線掃きは常時）=====
function nA(a){while(a>Math.PI)a-=2*Math.PI;while(a<-Math.PI)a+=2*Math.PI;return a;}
function updChair(c,dt){
  const ti=(c.inp.f?1:0)-(c.inp.b?1:0);
  if(ti!==0)c.spd+=ti*ACC*dt; else c.spd-=Math.sign(c.spd)*Math.min(Math.abs(c.spd),DEC*dt);
  c.spd=Math.max(-SPEED*0.6,Math.min(SPEED,c.spd)); c.spd*=0.999;
  const ri=(c.inp.r?1:0)-(c.inp.l?1:0);
  if(ri!==0)c.om+=ri*AAC*dt; else c.om-=Math.sign(c.om)*Math.min(Math.abs(c.om),ADC*dt);
  c.om=Math.max(-MO,Math.min(MO,c.om)); c.om*=0.99; c.th+=c.om*dt;
  const fx=Math.cos(c.th),fy=Math.sin(c.th);
  c.x+=fx*c.spd*dt; c.y+=fy*c.spd*dt; c.vx=fx*c.spd; c.vy=fy*c.spd;
  const R=EDGE;
  if(c.x<R){c.x=R;if(c.spd*fx<0)c.spd*=0.3;} if(c.x>L-R){c.x=L-R;if(c.spd*fx>0)c.spd*=0.3;}
  if(c.y<R){c.y=R;if(c.spd*fy<0)c.spd*=0.3;} if(c.y>Wd-R){c.y=Wd-R;if(c.spd*fy>0)c.spd*=0.3;}
}
function resolve(c){
  const dx=ball.x-c.x,dy=ball.y-c.y,ct=Math.cos(c.th),st=Math.sin(c.th);
  const lx=dx*ct+dy*st, ly=-dx*st+dy*ct, ex=HX+GUARD;
  const cxl=Math.max(-ex,Math.min(ex,lx)),cyl=Math.max(-HY,Math.min(HY,ly));
  let ddx=lx-cxl,ddy=ly-cyl,dist=Math.hypot(ddx,ddy),nlx,nly,pen;
  if(dist>1e-6){ if(dist>=BR)return; nlx=ddx/dist;nly=ddy/dist;pen=BR-dist; }
  else{ const dr=ex-lx,dl=lx+ex,dt2=HY-ly,db=ly+HY,m=Math.min(dr,dl,dt2,db);
    if(m===dr){nlx=1;nly=0}else if(m===dl){nlx=-1;nly=0}else if(m===dt2){nlx=0;nly=1}else{nlx=0;nly=-1}pen=BR+m; }
  const nx=nlx*ct-nly*st, ny=nlx*st+nly*ct, tx=-ny, tz=nx;
  const armX=cxl*ct-cyl*st, armY=cxl*st+cyl*ct;
  const vChairX=ct*c.spd, vChairY=st*c.spd;
  const vRotX=-c.om*armY, vRotY=c.om*armX;
  const vConX=vChairX+vRotX, vConY=vChairY+vRotY;
  const vRelX=ball.vx-vConX, vRelY=ball.vy-vConY, vn=vRelX*nx+vRelY*ny;
  let vAX=vRelX, vAY=vRelY;
  if(vn<0){ const imp=-(1+E)*vn; vAX+=imp*nx; vAY+=imp*ny; }
  const vRelT=vRelX*tx+vRelY*tz; vAX+=-GRIP*vRelT*tx; vAY+=-GRIP*vRelT*tz;
  ball.vx=vAX+vConX; ball.vy=vAY+vConY;
  if(vn<0||Math.abs(vRelT)>0.001){ lastHit={x:c.x+armX,y:c.y+armY,t:0.6}; }
  ball.x+=nx*pen; ball.y+=ny*pen;
}
function sep(){ for(let i=0;i<cs.length;i++)for(let k=i+1;k<cs.length;k++){const a=cs[i],b=cs[k];
  const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),md=EDGE*1.7;
  if(d<md&&d>1e-3){const o=(md-d)/2,ux=dx/d,uy=dy/d;a.x-=ux*o;a.y-=uy*o;b.x+=ux*o;b.y+=uy*o;a.spd*=0.8;b.spd*=0.8;}}}
function controlled(team){ let best=null,bd=1e9; cs.forEach(c=>{ if(c.tm!==team||(c.role==='gk'&&mode.n>1))return;
  const d=Math.hypot(ball.x-c.x,ball.y-c.y); if(d<bd){bd=d;best=c;} }); return best; }
function chaser(team){ let best=null,bd=1e9; cs.forEach(c=>{ if(c.tm!==team||c.role==='gk')return;
  const d=Math.hypot(ball.x-c.x,ball.y-c.y); if(d<bd){bd=d;best=c;} }); return best||cs.find(c=>c.tm===team); }
function steer(c,tx,ty,stop){ const ang=Math.atan2(ty-c.y,tx-c.x),diff=nA(ang-c.th);
  c.inp.l=diff<-0.12?1:0; c.inp.r=diff>0.12?1:0;
  c.inp.f=(Math.abs(diff)<0.7&&Math.hypot(tx-c.x,ty-c.y)>(stop||0.5))?1:0; c.inp.b=0; }
function ai(c,chB,chR){ const ch=c.tm==='blue'?chB:chR;
  if(c.role==='gk'&&mode.n>1){ const gx=c.tm==='blue'?L*0.05:L*0.95, gy=Math.max(gTop+0.5,Math.min(gBot-0.5,ball.y)); steer(c,gx,gy,0.3); return; }
  if(c===ch){ const og=c.tm==='blue'?{x:L,y:Wd/2}:{x:0,y:Wd/2}; let dx=ball.x-og.x,dy=ball.y-og.y,dl=Math.hypot(dx,dy)||1;
    steer(c, ball.x+dx/dl*(HX+GUARD+BR+0.3), ball.y+dy/dl*(HX+GUARD+BR+0.3), 0.25); return; }
  steer(c, c.hx, Math.max(1,Math.min(Wd-1, c.hy*0.5+ball.y*0.5)), 0.6); }

function step(dt){
  const cB=controlled('blue'), cR=mode.twoP?controlled('red'):null, chB=chaser('blue'), chR=chaser('red');
  cs.forEach(c=>{ if(c===cB){c.inp={f:inA.f|inO.f,b:inA.b|inO.b,l:inA.l|inO.l,r:inA.r|inO.r};}
    else if(c===cR){c.inp={...inB};} else ai(c,chB,chR); });
  cs.forEach(c=>updChair(c,dt)); sep();
  ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;
  const sp=Math.hypot(ball.vx,ball.vy); if(sp>0){const ns=Math.max(0,sp-BDEC*dt);ball.vx*=ns/sp;ball.vy*=ns/sp;}
  ball.vx*=0.999;ball.vy*=0.999; const s2=Math.hypot(ball.vx,ball.vy); if(s2>CAP){ball.vx*=CAP/s2;ball.vy*=CAP/s2;}
  cs.forEach(resolve);
  if(ball.x-BR<0){ if(ball.y>gTop&&ball.y<gBot){sR();return;} ball.x=BR;ball.vx=-ball.vx*WE; }
  if(ball.x+BR>L){ if(ball.y>gTop&&ball.y<gBot){sBl();return;} ball.x=L-BR;ball.vx=-ball.vx*WE; }
  if(ball.y-BR<0){ball.y=BR;ball.vy=-ball.vy*WE;} if(ball.y+BR>Wd){ball.y=Wd-BR;ball.vy=-ball.vy*WE;}
  if(lastHit)lastHit.t-=dt;
}
function sBl(){ sA++; place(); } function sR(){ sB++; place(); }

// ===== 描画（world→3D）=====
function toMeshX(wx){return wx-L/2;} function toMeshZ(wy){return wy-Wd/2;}
function syncMeshes(){
  cs.forEach(c=>{ c.mesh.position.set(toMeshX(c.x),0,toMeshZ(c.y)); c.mesh.rotation.y=-c.th; });
  ballMesh.position.set(toMeshX(ball.x),BR,toMeshZ(ball.y));
  const cB=controlled('blue'), cR=mode.twoP?controlled('red'):null, lead=cB||cR;
  if(lead){ ring.visible=true; ring.position.set(toMeshX(lead.x),0.04,toMeshZ(lead.y)); } else ring.visible=false;
  document.getElementById('score').textContent='青 '+sA+' - '+sB+' 赤   '+mode.n+'対'+mode.n;
  if(cB) document.getElementById('info').innerHTML='操作: #'+cB.num+' '+cB.name+'<br>車速 '+Math.abs(cB.spd).toFixed(1)+' m/s<br>回転 '+cB.om.toFixed(1)+' rad/s<br>ボール '+Math.hypot(ball.vx,ball.vy).toFixed(1)+' m/s';
}

// ===== カメラ（横/縦）=====
let orient='land';
function setCam(){
  const az = orient==='land'? 0 : Math.PI/2;
  const r=24, h=22;
  camera.position.set(Math.sin(az)*r, h, Math.cos(az)*r + (orient==='land'?2:0));
  camera.lookAt(0,0,0); camera.up.set(0,1,0);
}
function resize(){ const w=cv.clientWidth,h=cv.clientHeight; renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }

// ===== ループ =====
const hstep=1/120; let acc=0, last=performance.now();
function loop(t){ let dt=(t-last)/1000; last=t; dt=Math.min(dt,0.05);
  if(!paused){acc+=dt;let n=0;while(acc>=hstep&&n<8){step(hstep);acc-=hstep;n++;}}
  syncMeshes(); renderer.render(scene,camera); requestAnimationFrame(loop); }

// ===== 入力 =====
function key(e,v){ const k=e.key.toLowerCase(); let used=true;
  if(mode.twoP){ if(k==='w')inA.f=v;else if(k==='s')inA.b=v;else if(k==='a')inA.l=v;else if(k==='d')inA.r=v;
    else if(k==='arrowup')inB.f=v;else if(k==='arrowdown')inB.b=v;else if(k==='arrowleft')inB.l=v;else if(k==='arrowright')inB.r=v;else used=false; }
  else { if(k==='w'||k==='arrowup')inA.f=v;else if(k==='s'||k==='arrowdown')inA.b=v;else if(k==='a'||k==='arrowleft')inA.l=v;else if(k==='d'||k==='arrowright')inA.r=v;else used=false; }
  if(used)e.preventDefault(); }
addEventListener('keydown',e=>key(e,1)); addEventListener('keyup',e=>key(e,0));
function hold(id,p){ const b=document.getElementById(id);
  const on=e=>{e.preventDefault();inO[p]=1;},off=e=>{e.preventDefault();inO[p]=0;};
  b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);b.addEventListener('pointerleave',off);b.addEventListener('pointercancel',off); }
hold('bF','f');hold('bB','b');hold('bL','l');hold('bR','r');
document.querySelectorAll('#modes .btn').forEach(b=>b.addEventListener('click',()=>start(MODES[b.dataset.m])));
document.getElementById('play').addEventListener('click',function(){paused=!paused;this.textContent=paused?'再生':'一時停止';});
document.getElementById('reset').addEventListener('click',()=>place());
document.getElementById('orient').addEventListener('click',function(){orient=orient==='land'?'port':'land';this.textContent=orient==='land'?'縦型にする':'横型にする';setCam();});

// 戦術ドラッグ（停止中）
const ray=new THREE.Raycaster(), ndc=new THREE.Vector2(); let drag=null;
function pickWorld(ev){ const r=cv.getBoundingClientRect(); ndc.x=((ev.clientX-r.left)/r.width)*2-1; ndc.y=-((ev.clientY-r.top)/r.height)*2+1;
  ray.setFromCamera(ndc,camera); const hit=new THREE.Vector3(); ray.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0,1,0),0),hit);
  return hit?{x:hit.x+L/2,y:hit.z+Wd/2}:null; }
cv.addEventListener('pointerdown',ev=>{ if(!paused)return; const w=pickWorld(ev); if(!w)return; let best=null,bd=1.2;
  cs.forEach(c=>{const d=Math.hypot(c.x-w.x,c.y-w.y);if(d<bd){bd=d;best=c;}});
  const db=Math.hypot(ball.x-w.x,ball.y-w.y); if(db<bd&&db<1.2)best=ball;
  if(best){drag=best;cv.setPointerCapture(ev.pointerId);} });
cv.addEventListener('pointermove',ev=>{ if(!drag)return; const w=pickWorld(ev); if(!w)return;
  drag.x=Math.max(0.5,Math.min(L-0.5,w.x)); drag.y=Math.max(0.5,Math.min(Wd-0.5,w.y)); if(drag.spd!==undefined){drag.spd=0;drag.om=0;} });
cv.addEventListener('pointerup',()=>drag=null); cv.addEventListener('pointercancel',()=>drag=null);

addEventListener('resize',resize);
start(MODES['4v4']); setCam(); resize(); requestAnimationFrame(loop);
</script>
</body>
